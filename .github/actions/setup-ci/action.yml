name: Setup CI Python
description: Prepare the GitHub Actions runner with Python, system packages, JWT keys, and Python dependencies.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.11"
  install-build:
    description: Whether to install the build package for wheel/sdist jobs.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config

    - name: Generate ephemeral RSA keys for CI
      shell: bash
      run: |
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private_ci.pem
        openssl rsa -pubout -in private_ci.pem -out public_ci.pem

        {
          echo "JWT__PRIVATE_KEY_PEM<<EOF"
          cat private_ci.pem
          echo "EOF"
          echo "JWT__PUBLIC_KEY_PEM<<EOF"
          cat public_ci.pem
          echo "EOF"
        } >> "$GITHUB_ENV"

        rm -f private_ci.pem public_ci.pem

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install .[dev]
        if [ "${{ inputs.install-build }}" = "true" ]; then
          python -m pip install build==1.2.2.post1
        fi
