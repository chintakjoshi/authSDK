      SAML__SP_X509_CERT: ${SAML__SP_X509_CERT:-local-sp-cert}
      SAML__SP_PRIVATE_KEY: ${SAML__SP_PRIVATE_KEY:-local-sp-private-key}
      SAML__IDP_ENTITY_ID: ${SAML__IDP_ENTITY_ID:-local-idp-entity}
